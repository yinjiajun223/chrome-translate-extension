<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 280px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1e1e1e;
      color: #fff;
      margin: 0;
    }
    h3 {
      margin: 0 0 12px 0;
      font-size: 16px;
      color: #2563eb;
    }
    .info {
      font-size: 13px;
      color: #aaa;
      line-height: 1.6;
    }
    .quota {
      margin-top: 12px;
      padding: 12px;
      background: #2a2a2a;
      border-radius: 8px;
    }
    .quota-label {
      font-size: 12px;
      color: #888;
    }
    .quota-value {
      font-size: 24px;
      font-weight: bold;
      color: #2563eb;
      margin-top: 4px;
    }
    .note {
      margin-top: 12px;
      font-size: 11px;
      color: #666;
    }
  </style>
</head>
<body>
  <h3>🦞 划词翻译</h3>
  <div class="info">
    选中英文文本，点击「翻译」按钮查看中文翻译
  </div>
  <div class="quota">
    <div class="quota-label">今日剩余翻译次数</div>
    <div class="quota-value" id="quota">--</div>
  </div>
  <div class="note">
    MyMemory 免费版每日 1000 字符
  </div>
  <script src="popup.js"></script>
</body>
</html>
